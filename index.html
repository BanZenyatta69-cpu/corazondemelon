<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Juli 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body {
  background:#000;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  cursor:none;
}

canvas {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
}

.cursor {
  position:fixed;
  width:20px; height:20px;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}
.cursor svg { width:100%;height:100%; }

.scene {
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:32px;
}

.heart-wrap {
  position:relative;
  width:180px; height:170px;
  cursor:none;
}

.heart-wrap svg {
  width:100%;height:100%;
  filter:drop-shadow(0 0 20px #ff2d55) drop-shadow(0 0 60px #ff006680);
  animation: beat 1s cubic-bezier(.215,.61,.355,1) infinite;
  transform-origin:center;
  transition: filter 0.2s;
}
.heart-wrap:hover svg {
  filter:drop-shadow(0 0 40px #ff2d55) drop-shadow(0 0 90px #ff2d55) drop-shadow(0 0 140px #ff006699);
}

@keyframes beat {
  0%   {transform:scale(1);}
  12%  {transform:scale(1.22);}
  24%  {transform:scale(1);}
  36%  {transform:scale(1.14);}
  58%  {transform:scale(1);}
  100% {transform:scale(1);}
}

.ring {
  position:absolute;
  inset:-20px;
  border-radius:50%;
  border:2px solid rgba(255,45,85,0.4);
  animation: ripple 1s ease-out infinite;
}
.ring:nth-child(2){animation-delay:.33s;border-color:rgba(255,100,150,0.3);}
.ring:nth-child(3){animation-delay:.66s;border-color:rgba(255,150,180,0.2);}

@keyframes ripple {
  0%   {transform:scale(0.8); opacity:1;}
  100% {transform:scale(1.8); opacity:0;}
}

.label {
  font-family:'Dancing Script',cursive;
  font-size:2.4rem;
  background: linear-gradient(135deg,#ff8fab,#ff2d55,#c9184a,#ffb3c6,#ff2d55);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: shimmer 3s linear infinite;
  background-size:300% auto;
}
@keyframes shimmer {
  0%{background-position:0% center;}
  100%{background-position:300% center;}
}

.hint {
  font-family:'Dancing Script',cursive;
  font-size:0.95rem;
  color:rgba(255,150,170,0.5);
  letter-spacing:0.1em;
  animation:blink 2.2s ease-in-out infinite;
}
@keyframes blink {
  0%,100%{opacity:0.3;}
  50%{opacity:0.9;}
}

#flash {
  position:fixed;inset:0;
  background:radial-gradient(ellipse at center, rgba(255,100,150,0.65), transparent 65%);
  pointer-events:none;
  z-index:500;
  opacity:0;
}

.juli {
  position:fixed;
  pointer-events:none;
  z-index:800;
  font-family:'Abril Fatface',serif;
  color:var(--c);
  text-shadow:0 0 14px var(--c), 0 0 40px var(--c);
  white-space:nowrap;
  will-change:transform,opacity;
  transform:translate(-50%,-50%);
}
</style>
</head>
<body>

<div class="cursor" id="cursor">
  <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
    <path d="M50 85 C50 85 4 55 4 27 A23 23 0 0 1 50 19 A23 23 0 0 1 96 27 C96 55 50 85 50 85Z" fill="#ff2d55"/>
  </svg>
</div>

<canvas id="c"></canvas>
<div id="flash"></div>

<div class="scene">
  <div class="heart-wrap" id="mainHeart">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="hg" cx="40%" cy="35%" r="65%">
          <stop offset="0%"   stop-color="#ff8fab"/>
          <stop offset="45%"  stop-color="#ff2d55"/>
          <stop offset="100%" stop-color="#6b0020"/>
        </radialGradient>
        <radialGradient id="spec" cx="35%" cy="30%" r="30%">
          <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </radialGradient>
      </defs>
      <path d="M50 85 C50 85 4 55 4 27 A23 23 0 0 1 50 19 A23 23 0 0 1 96 27 C96 55 50 85 50 85Z" fill="url(#hg)"/>
      <path d="M50 85 C50 85 4 55 4 27 A23 23 0 0 1 50 19 A23 23 0 0 1 96 27 C96 55 50 85 50 85Z" fill="url(#spec)"/>
    </svg>
  </div>
  <div class="label">Juli</div>
  <div class="hint">✦ espicha ✦</div>
</div>

<script>
const cur = document.getElementById('cursor');
window.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top  = e.clientY + 'px';
});

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener('resize', resize);

const PINKS = ['#ff2d55','#ff6b8a','#ff8fab','#ffb3c6','#ffd6e2','#c9184a','#ff4d6d','#ffe0eb','#ff85a1'];

function drawHeart(c, x, y, size, color, alpha=1){
  c.save();
  c.globalAlpha = alpha;
  c.fillStyle = color;
  c.shadowColor = color;
  c.shadowBlur = 16;
  c.beginPath();
  const s = size;
  c.moveTo(x, y + s*0.35);
  c.bezierCurveTo(x, y, x - s, y, x - s, y + s*0.35);
  c.bezierCurveTo(x - s, y + s*0.85, x, y + s*1.25, x, y + s*1.25);
  c.bezierCurveTo(x, y + s*1.25, x + s, y + s*0.85, x + s, y + s*0.35);
  c.bezierCurveTo(x + s, y, x, y, x, y + s*0.35);
  c.closePath();
  c.fill();
  c.restore();
}

class Particle {
  constructor(x, y, burst){
    this.x = x; this.y = y;
    this.burst = burst;
    const a = Math.random() * Math.PI * 2;
    const spd = burst ? Math.random()*20+5 : Math.random()*1.2+0.2;
    this.vx = Math.cos(a) * spd;
    this.vy = Math.sin(a) * spd - (burst ? Math.random()*10+2 : 0);
    this.life = 1;
    this.decay = burst ? Math.random()*0.016+0.01 : Math.random()*0.004+0.002;
    this.size = burst ? Math.random()*12+3 : Math.random()*2.5+0.8;
    this.color = PINKS[Math.floor(Math.random()*PINKS.length)];
    this.isHeart = burst && Math.random() < 0.65;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.22;
    this.gravity = burst ? 0.3 : 0.012;
    this.trail = [];
  }
  update(){
    if(this.burst) this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > 6) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.985;
    this.life -= this.decay;
    this.rot += this.rotV;
  }
  draw(){
    if(this.life <= 0) return;
    const a = Math.max(0, this.life);
    // trail
    for(let i=0;i<this.trail.length;i++){
      const ta = (i/this.trail.length)*a*0.4;
      ctx.save();
      ctx.globalAlpha = ta;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.size*0.3*(i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    if(this.isHeart){
      drawHeart(ctx, 0, -this.size*0.6, this.size*0.55, this.color);
    } else {
      // sparkle
      ctx.fillStyle = this.color;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 10;
      const r = this.size * 0.5;
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const ang = i*Math.PI/2;
        ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
        ctx.lineTo(Math.cos(ang+Math.PI/4)*r*0.3, Math.sin(ang+Math.PI/4)*r*0.3);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
}

let particles = [];

function spawnAmbient(){
  if(Math.random() < 0.25) particles.push(new Particle(Math.random()*W, H+10, false));
}

/* ---- trail del cursor ---- */
let mouseX=W/2, mouseY=H/2;
window.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });
function spawnTrail(){
  if(Math.random()<0.4){
    const p = new Particle(mouseX + (Math.random()-0.5)*8, mouseY + (Math.random()-0.5)*8, false);
    p.size = Math.random()*3+1;
    p.decay = 0.025;
    particles.push(p);
  }
}

/* ---- nombres Juli DOM ---- */
const JCOLS=['#ff2d55','#ff6b8a','#ffb3c6','#ff4d6d','#ffd6e2','#c9184a','#ffe0eb'];
function spawnJuli(cx, cy){
  const count = 30;
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className='juli';
      const fs = Math.random()*38+16;
      const angle = Math.random()*Math.PI*2;
      const dist = Math.random()*380+120;
      const ex = Math.cos(angle)*dist + (Math.random()-0.5)*60;
      const ey = Math.sin(angle)*dist - Math.random()*220 - 60;
      const col = JCOLS[Math.floor(Math.random()*JCOLS.length)];
      el.textContent = 'te amo';
      el.style.cssText=`font-size:${fs}px;left:${cx}px;top:${cy}px;--c:${col};opacity:0;transform:translate(-50%,-50%) scale(0);`;
      document.body.appendChild(el);

      const dur = Math.random()*1000+1100;
      const start = performance.now();
      function anim(t){
        const raw = (t-start)/dur;
        const p = Math.min(1, raw);
        const ease = 1-Math.pow(1-p,3);
        const x = ex*ease;
        const y = ey*ease - 80*Math.sin(p*Math.PI);
        const sc = p<0.12 ? p/0.12 : p>0.68 ? 1-(p-0.68)/0.32 : 1;
        const op = p>0.62 ? 1-(p-0.62)/0.38 : 1;
        el.style.transform=`translate(calc(-50% + ${x}px),calc(-50% + ${y}px)) scale(${sc})`;
        el.style.opacity=op;
        if(p<1) requestAnimationFrame(anim);
        else el.remove();
      }
      requestAnimationFrame(anim);
    }, Math.random()*280);
  }
}

/* ---- shockwave canvas ---- */
let shockwaves = [];
class Shockwave {
  constructor(x,y){ this.x=x;this.y=y;this.r=0;this.life=1; }
  update(){ this.r+=22; this.life-=0.045; }
  draw(){
    if(this.life<=0)return;
    ctx.save();
    ctx.globalAlpha=this.life*0.6;
    ctx.strokeStyle='#ff2d55';
    ctx.shadowColor='#ff2d55';
    ctx.shadowBlur=20;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

/* ---- click ---- */
const flash = document.getElementById('flash');
document.getElementById('mainHeart').addEventListener('click', function(e){
  const cx=e.clientX, cy=e.clientY;

  // flash
  flash.style.transition='none';
  flash.style.opacity='1';
  setTimeout(()=>{ flash.style.transition='opacity 0.4s'; flash.style.opacity='0'; },60);

  // shake
  const body=document.body;
  body.style.transition='transform 0.05s';
  [{t:'translate(5px,-5px)'},{t:'translate(-4px,4px)'},{t:'translate(3px,-2px)'},{t:'none'}]
    .forEach((s,i)=>setTimeout(()=>{body.style.transform=s.t;},i*55));

  // shockwaves
  for(let i=0;i<3;i++) setTimeout(()=>shockwaves.push(new Shockwave(cx,cy)), i*120);

  // particles
  for(let i=0;i<300;i++) particles.push(new Particle(cx,cy,true));

  // Juli names
  spawnJuli(cx,cy);
});

/* ---- loop ---- */
function loop(){
  ctx.clearRect(0,0,W,H);
  spawnAmbient();
  spawnTrail();

  shockwaves = shockwaves.filter(s=>{ s.update(); s.draw(); return s.life>0; });
  particles  = particles.filter(p=>{ p.update(); p.draw(); return p.life>0; });

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
